<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#1C0808"/>
  <!-- Teal accent bar -->
  <rect y="590" width="1200" height="6" fill="#5BBFB5"/>
  <!-- Large background missile arcs -->
  <g opacity="0.08" stroke="#5BBFB5" stroke-width="12" fill="none" stroke-linecap="round">
    <path d="M 100,580 Q 400,300 700,80"/>
    <path d="M 300,580 Q 580,300 850,80"/>
    <path d="M 500,580 Q 750,320 1050,100"/>
  </g>
  <!-- Wordmark -->
  <text
